name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same branch (saves CI minutes on fast-push)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: '${{ matrix.os }} / Node ${{ matrix.node }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, node: '22' } # latest LTS on Linux
          - { os: windows-latest, node: '20' } # engines floor + Windows path coverage

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      # build sets NODE_OPTIONS=--max-old-space-size=8192 via cross-env (see CLAUDE.md)
      - name: Build (TypeScript + schema emit)
        run: npm run build

      - name: Validate catalog
        run: npm run validate

      - name: Run tests
        run: npm test

      - name: Build catalog output (claude + copilot)
        run: npm run catalog:build

      # Smoke-test the compiled CLI binary directly
      - name: CLI smoke test
        run: |
          node dist-cli/cli.js --version
          node dist-cli/cli.js list
