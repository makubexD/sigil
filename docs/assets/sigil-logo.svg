<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" role="img" aria-label="Sigil logo">
  <title>Sigil — one source, every assistant</title>
  <defs>
    <linearGradient id="sealGradL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4545C0"/>
      <stop offset="100%" stop-color="#1A1A65"/>
    </linearGradient>
  </defs>

  <!-- ── Icon: seal mark centred vertically in a 72×72 left zone ─────────────── -->
  <g transform="translate(4, 4)">
    <!-- Seal ring -->
    <circle cx="25" cy="32" r="19"
            fill="none" stroke="url(#sealGradL)" stroke-width="3"/>

    <!-- Inscribed sigil glyph — angular S-rune (Sowilo-style zigzag) -->
    <polyline points="34,20 14,32 34,44"
              fill="none" stroke="url(#sealGradL)" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Radiating rays from seal's right edge → three output targets -->
    <line x1="44" y1="32" x2="57" y2="23" stroke="#D49A2A" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="32" x2="60" y2="32" stroke="#D49A2A" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="32" x2="57" y2="41" stroke="#D49A2A" stroke-width="2" stroke-linecap="round"/>

    <!-- Terminal nodes -->
    <circle cx="57" cy="23" r="2.5" fill="#D49A2A"/>
    <circle cx="60" cy="32" r="2.5" fill="#D49A2A"/>
    <circle cx="57" cy="41" r="2.5" fill="#D49A2A"/>
  </g>

  <!-- ── Thin vertical separator ─────────────────────────────────────────────── -->
  <line x1="80" y1="14" x2="80" y2="58" stroke="#C8C8E8" stroke-width="1"/>

  <!-- ── Wordmark ────────────────────────────────────────────────────────────── -->
  <text x="90" y="46"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="300" fill="#1E1E6E" letter-spacing="4">sigil</text>

  <!-- ── Tagline ─────────────────────────────────────────────────────────────── -->
  <text x="92" y="62"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="10" fill="#9090C0" letter-spacing="3" font-style="italic">one source, every assistant</text>
</svg>
